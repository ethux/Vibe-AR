system_prompt_id = "vibe-ar"
active_model = "mistral-large-latest"

# Cloud provider (Mistral API via proxy)
[[providers]]
name = "mistral"
api_base = "http://web:3001/mistral-proxy/v1"
api_key_env_var = "MISTRAL_API_KEY"
backend = "generic"

# Local provider (vLLM via proxy)
[[providers]]
name = "vllm"
api_base = "http://web:3001/mistral-proxy/v1"
api_key_env_var = "VLLM_API_KEY"
backend = "generic"

# Local Devstral Small (24B) via vLLM — fast, free, on your own GPU
[[models]]
name = "Devstral-Small"
provider = "vllm"
alias = "devstral"
temperature = 0.15

# Mistral Large (cloud) — most capable, paid API
[[models]]
name = "mistral-large-latest"
provider = "mistral"
alias = "large"
temperature = 0.15

[[mcp_servers]]
name = "vibe_ar"
transport = "stdio"
command = "python"
args = ["/opt/mcp-server/server.py"]
env = { "VIBE_WEB_URL" = "http://web:3001", "VIBE_WORKSPACE" = "/workspace" }
startup_timeout_sec = 10
tool_timeout_sec = 30
