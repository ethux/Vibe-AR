services:
  vibe-terminal:
    build: .
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - VLLM_API_KEY=${VLLM_API_KEY}
      - GH_TOKEN=${GH_TOKEN}
      - GITHUB_TOKEN=${GH_TOKEN}
      - VIBE_HOME=/root/.vibe
    volumes:
      - ./workspace:/workspace
    ports:
      - "5173:5173"
      - "3333:3333"
      - "8080:8080"
      - "4321:4321"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - ./public:/app/public
      - ./server:/app/server
      - ./certs:/app/certs:ro
      - ./workspace:/app/workspace:ro
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - VLLM_API_KEY=${VLLM_API_KEY}
      - MISTRAL_API_URL=${MISTRAL_API_URL:-https://api.mistral.ai}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - TTYD_URL=http://vibe-terminal:7681
      - COMPANION_URL=http://companion:8000
      - CODECITY_URL=http://code-city-server:5001
    depends_on:
      - vibe-terminal
      - companion
      - code-city-server

  companion:
    build:
      context: ./companion
      dockerfile: ../Dockerfile.companion
    ports:
      - "8000:8000"
    volumes:
      - ./workspace:/workspace
    environment:
      - VIBE_WORKSPACE=/workspace
    restart: unless-stopped

  code-city-server:
    build:
      context: ./code-city-server
      dockerfile: ../Dockerfile.codecity
    ports:
      - "5001:5001"
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
    restart: unless-stopped
